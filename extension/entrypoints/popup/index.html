<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chalk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 200px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
    }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #111; }
    #toggle {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }
    #toggle.off { background: #111; color: #fff; }
    #toggle.on  { background: #f0f0f0; color: #111; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
      text-align: center;
      min-height: 16px;
    }
    #error { margin-top: 10px; font-size: 12px; color: #c0392b; }
  </style>
</head>
<body>
  <h1>Chalk</h1>
  <button id="toggle" class="off">Draw on this page</button>
  <div id="status"></div>
  <div id="error"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
